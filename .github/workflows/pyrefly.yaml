name: Pyrefly

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🏗 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: 🏗 Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: 👀 Cache prek
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/prek
          key: prek-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: 🏗 Install dependencies
        run: |
          uv venv .venv/
          uv pip install --requirement requirements.txt

      - name: 🏗 Install dev dependencies
        run: |
          uv pip install prek

      - name: 🏗 Install workflow dependencies (pyhaopenmotics)
        run: uv pip install .

      - name: 🏗 Install pyrefly
        # if we install it via uv pip install, it cannot be found afterwards.
        run: pip install pyrefly

      - name: 🚀 Run pre-commit (prek)
        run: |
          # Enable color output for prek
          # prek run --all-files --show-diff-on-failure --color always
          uvx prek run pyrefly-check --all-files --show-diff-on-failure --color always
